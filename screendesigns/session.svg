<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <rect width="390" height="844" fill="#f6f6f4"/>

  <!-- Header -->
  <text x="32" y="66" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#101214">Chest A session</text>



  <text x="32" y="92" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#6b7280">Draft • 42 min elapsed</text>
  <text x="32" y="114" font-family="Inter, Arial, sans-serif" font-size="11.5" font-weight="500" fill="#6b7280">Sequence matters, drag exercises to reorder.</text>

  <rect x="302" y="44" width="56" height="38" rx="12" fill="#ffffff" stroke="#ef4444" stroke-width="1.3"/>
  <text x="330" y="68" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#dc2626" text-anchor="middle">DNF</text>

  <text x="32" y="150" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#6b7280">COMPLETED</text>

  <!-- Row 1 -->
  <rect x="28" y="170" width="334" height="58" rx="18" fill="#ffffff" stroke="#e1e6ed" stroke-width="1.3"/>
  <circle cx="56" cy="199" r="16" fill="#ffffff" stroke="#d5dce5" stroke-width="1.4"/>
  <text x="56" y="204" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#101214" text-anchor="middle">1</text>
  <text x="82" y="195" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#101214">Incline DB Press</text>
  <text x="82" y="215" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#6b7280">60 lb × 10 × 3</text>
  <circle cx="336" cy="199" r="11" fill="#e8f6ed" stroke="#2b8a57" stroke-width="1.4"/>
  <path d="M331.5 199 l3.2 3.2 l6.5 -7" fill="none" stroke="#2b8a57" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Row 2 -->
  <rect x="28" y="244" width="334" height="58" rx="18" fill="#ffffff" stroke="#e1e6ed" stroke-width="1.3"/>
  <circle cx="56" cy="273" r="16" fill="#ffffff" stroke="#d5dce5" stroke-width="1.4"/>
  <text x="56" y="278" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#101214" text-anchor="middle">3</text>
  <text x="82" y="269" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#101214">Machine Chest Press</text>
  <text x="82" y="289" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#6b7280">60 lb × 10 × 3</text>
  <circle cx="336" cy="273" r="11" fill="#fff7e8" stroke="#d4a63a" stroke-width="1.4"/>
  <path d="M336 267.5 v5 l3 1.8" fill="none" stroke="#d4a63a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Expanded card -->
  <rect x="28" y="326" width="334" height="170" rx="20" fill="#ffffff" stroke="#dbe1e8" stroke-width="1.5"/>
  <circle cx="56" cy="358" r="16" fill="#ffffff" stroke="#d5dce5" stroke-width="1.4"/>
  <text x="56" y="363" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#101214" text-anchor="middle">2</text>
  <text x="84" y="358" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#101214">Cable Fly</text>
  <text x="84" y="382" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#6b7280">Prev: 25 lb × 12 × 3</text>

  <!-- same in-progress icon -->
  <circle cx="336" cy="358" r="11" fill="#fff7e8" stroke="#d4a63a" stroke-width="1.4"/>
  <path d="M336 352.5 v5 l3 1.8" fill="none" stroke="#d4a63a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Inputs -->
  <text x="52" y="414" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#6b7280">Sets</text>
  <text x="132" y="414" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#6b7280">Reps</text>
  <text x="214" y="414" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#6b7280">Weight</text>
  <text x="300" y="414" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#6b7280">Unit</text>

  <rect x="52" y="426" width="56" height="28" rx="10" fill="#ffffff" stroke="#dbe1e8" stroke-width="1.4"/>
  <text x="80" y="445" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#101214" text-anchor="middle">3</text>

  <rect x="132" y="426" width="56" height="28" rx="10" fill="#ffffff" stroke="#dbe1e8" stroke-width="1.4"/>
  <text x="160" y="445" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#101214" text-anchor="middle">12</text>

  <rect x="214" y="426" width="74" height="28" rx="10" fill="#ffffff" stroke="#dbe1e8" stroke-width="1.4"/>
  <text x="251" y="445" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#101214" text-anchor="middle">25</text>

  <rect x="300" y="426" width="42" height="28" rx="10" fill="#ffffff" stroke="#dbe1e8" stroke-width="1.4"/>
  <text x="321" y="445" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#101214" text-anchor="middle">lb</text>

  <!-- Footer actions -->
  <rect x="52" y="462" width="112" height="28" rx="14" fill="#2f8f57"/>
  <text x="108" y="480" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Completed</text>

  <rect x="252" y="462" width="90" height="28" rx="14" fill="#f7f9fb" stroke="#dbe1e8" stroke-width="1.2"/>
  <text x="297" y="480" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#6b7280" text-anchor="middle">Notes</text>

  <!-- Row 4 -->
  <rect x="28" y="512" width="334" height="58" rx="18" fill="#ffffff" stroke="#e1e6ed" stroke-width="1.3"/>
  <circle cx="56" cy="541" r="16" fill="#ffffff" stroke="#d5dce5" stroke-width="1.4"/>
  <text x="56" y="546" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#101214" text-anchor="middle">4</text>
  <text x="82" y="537" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#101214">Add stretch</text>
  <text x="82" y="557" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#6b7280">Optional finisher</text>
  <circle cx="336" cy="541" r="11" fill="#fff7e8" stroke="#d4a63a" stroke-width="1.4"/>
  <path d="M336 535.5 v5 l3 1.8" fill="none" stroke="#d4a63a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Add exercise -->
  <rect x="28" y="594" width="334" height="42" rx="14" fill="#ffffff" stroke="#dbe1e8" stroke-width="1.5"/>
  <text x="48" y="621" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#6b7280">+ Add exercise</text>

  <!-- Finish workout -->
  <rect x="28" y="654" width="334" height="50" rx="16" fill="#2b8a57" stroke="#2b8a57" stroke-width="1.5"/>
  <text x="195" y="686" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Finish workout</text>

  <!-- Bottom nav -->
  <line x1="0" y1="742" x2="390" y2="742" stroke="#d9dde3" stroke-width="1.2"/>
  <rect x="0" y="742" width="390" height="102" fill="#f6f6f4"/>
  <text x="83" y="800" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#2b8a57" text-anchor="middle">Home</text>
  <text x="165" y="800" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#6b7280" text-anchor="middle">Routines</text>
  <text x="247" y="800" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#6b7280" text-anchor="middle">Progress</text>
  <text x="330" y="800" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#6b7280" text-anchor="middle">Settings</text>
</svg>